name: Build & Test - Joomla AJAX Forms

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'plg_ajax_joomlaajaxforms/**'
  pull_request:
    branches:
      - main
    paths:
      - 'plg_ajax_joomlaajaxforms/**'

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Build extension
        run: |
          cd plg_ajax_joomlaajaxforms
          VERSION=$(grep -oP '(?<=<version>)[^<]+' joomlaajaxforms.xml)
          PACKAGE="plg_ajax_joomlaajaxforms_v${VERSION}.zip"
          zip -r "$PACKAGE" . -x "*.git*" -x "tests/*" -x "*.zip"
          echo "Built: $PACKAGE"
          ls -la "$PACKAGE"
          cp "$PACKAGE" tests/extension.zip
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: plg_ajax_joomlaajaxforms/plg_ajax_joomlaajaxforms_*.zip
          retention-days: 7

  test-j5:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Configuration'
            script: 'configuration'
          - name: '03 - AJAX Endpoint'
            script: 'ajax-endpoint'
          - name: '04 - Login'
            script: 'login'
          - name: '05 - Registration'
            script: 'registration'
          - name: '06 - Reset Request'
            script: 'reset-request'
          - name: '07 - Remind Request'
            script: 'remind-request'
          - name: '08 - Security'
            script: 'security'
          - name: '10 - Profile'
            script: 'profile'
          - name: '11 - J2Store Cart'
            script: 'j2store-cart'
          - name: '12 - Htaccess Check'
            script: 'htaccess-check'
          - name: '09 - Uninstall'
            script: 'uninstall'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: plg_ajax_joomlaajaxforms/tests/
      
      - name: Rename package
        run: |
          cd plg_ajax_joomlaajaxforms/tests
          mv plg_ajax_joomlaajaxforms_*.zip extension.zip
      
      - name: Start test environment
        run: |
          cd plg_ajax_joomlaajaxforms/tests
          docker compose up -d
          timeout 300 bash -c 'until docker exec plg_ajax_joomlaajaxforms_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
      
      - name: Run tests
        run: |
          cd plg_ajax_joomlaajaxforms/tests
          chmod +x run-tests.sh
          ./run-tests.sh ${{ matrix.script }}
      
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: j5-${{ matrix.script }}-logs
          path: plg_ajax_joomlaajaxforms/tests/test-results/*.txt
          retention-days: 7
      
      - name: Cleanup
        if: always()
        run: |
          cd plg_ajax_joomlaajaxforms/tests
          docker compose down -v

  test-j6:
    name: ${{ matrix.name }} (J6)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Configuration'
            script: 'configuration'
          - name: '03 - AJAX Endpoint'
            script: 'ajax-endpoint'
          - name: '04 - Login'
            script: 'login'
          - name: '05 - Registration'
            script: 'registration'
          - name: '06 - Reset Request'
            script: 'reset-request'
          - name: '07 - Remind Request'
            script: 'remind-request'
          - name: '08 - Security'
            script: 'security'
          - name: '10 - Profile'
            script: 'profile'
          - name: '11 - J2Store Cart'
            script: 'j2store-cart'
          - name: '12 - Htaccess Check'
            script: 'htaccess-check'
          - name: '09 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: plg_ajax_joomlaajaxforms/tests/
      - name: Rename package
        run: mv plg_ajax_joomlaajaxforms/tests/plg_ajax_joomlaajaxforms_*.zip plg_ajax_joomlaajaxforms/tests/extension.zip
      - name: Start environment (J6)
        run: |
          cd plg_ajax_joomlaajaxforms/tests
          docker compose -f docker-compose.joomla6.yml up -d
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec plg_ajax_joomlaajaxforms_j6_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd plg_ajax_joomlaajaxforms/tests
          docker compose -f docker-compose.joomla6.yml logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd plg_ajax_joomlaajaxforms/tests
          chmod +x run-tests.sh
          CONTAINER_NAME=plg_ajax_joomlaajaxforms_j6_test ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: j6-${{ matrix.script }}-logs
          path: plg_ajax_joomlaajaxforms/tests/test-results/*.txt
          retention-days: 7
      - name: Cleanup
        if: always()
        run: |
          cd plg_ajax_joomlaajaxforms/tests
          docker compose -f docker-compose.joomla6.yml down -v

  validate:
    name: Validate Package
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: ./
      
      - name: Validate XML manifest
        run: |
          cd plg_ajax_joomlaajaxforms
          echo "Validating joomlaajaxforms.xml..."
          
          # Check required elements
          grep -q '<extension type="plugin"' joomlaajaxforms.xml || (echo "Missing extension element" && exit 1)
          grep -q '<name>' joomlaajaxforms.xml || (echo "Missing name element" && exit 1)
          grep -q '<version>' joomlaajaxforms.xml || (echo "Missing version element" && exit 1)
          grep -q '<namespace' joomlaajaxforms.xml || (echo "Missing namespace element" && exit 1)
          
          echo "XML manifest is valid"
      
      - name: Validate PHP syntax
        run: |
          cd plg_ajax_joomlaajaxforms
          echo "Checking PHP syntax..."
          find . -name "*.php" -print0 | xargs -0 -n1 php -l
          echo "PHP syntax is valid"
      
      - name: Validate JavaScript syntax
        run: |
          cd plg_ajax_joomlaajaxforms
          echo "Checking JavaScript syntax..."
          if command -v node &> /dev/null; then
            node --check media/js/joomlaajaxforms.js
          else
            echo "Node.js not available, skipping JS validation"
          fi
      
      - name: Check language files
        run: |
          cd plg_ajax_joomlaajaxforms
          echo "Checking language files..."
          
          # Check EN-GB files exist
          test -f language/en-GB/plg_ajax_joomlaajaxforms.ini || (echo "Missing EN-GB ini file" && exit 1)
          test -f language/en-GB/plg_ajax_joomlaajaxforms.sys.ini || (echo "Missing EN-GB sys.ini file" && exit 1)
          
          # Check DE-DE files exist
          test -f language/de-DE/plg_ajax_joomlaajaxforms.ini || (echo "Missing DE-DE ini file" && exit 1)
          test -f language/de-DE/plg_ajax_joomlaajaxforms.sys.ini || (echo "Missing DE-DE sys.ini file" && exit 1)
          
          echo "Language files are present"

  test-j2c4-full:
    name: J5 + J2Commerce 4 (full install)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: plg_ajax_joomlaajaxforms/tests-j2c4/

      - name: Rename package
        run: mv plg_ajax_joomlaajaxforms/tests-j2c4/plg_ajax_joomlaajaxforms_*.zip \
               plg_ajax_joomlaajaxforms/tests-j2c4/extension.zip

      - name: Build image (downloads J2Commerce 4 from public GitHub release)
        run: |
          cd plg_ajax_joomlaajaxforms
          docker build \
            -f tests-j2c4/Dockerfile \
            --build-arg J2C4_URL=https://github.com/j2commerce/j2cart/releases/download/v4.1.3/com_j2store_v4-4.1.3-pro.zip \
            -t plg_ajax_j2c4_test \
            ../

      - name: Start environment
        run: |
          cd plg_ajax_joomlaajaxforms/tests-j2c4
          docker compose up -d
          timeout 360 bash -c \
            'until docker inspect plg_ajax_j2c4_test \
               --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; \
             do sleep 5; done'

      - name: Show container logs
        if: always()
        run: docker logs plg_ajax_j2c4_test 2>&1 | tail -80 || true

      - name: Run J2C4 cart tests
        run: |
          cd plg_ajax_joomlaajaxforms/tests-j2c4
          chmod +x run-tests.sh
          ./run-tests.sh 11-j2c4-cart

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: j2c4-full-logs
          path: plg_ajax_joomlaajaxforms/tests-j2c4/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          cd plg_ajax_joomlaajaxforms/tests-j2c4
          docker compose down -v

  test-j2c6-full:
    name: J6 + J2Commerce 6 (full install)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: plg_ajax_joomlaajaxforms/tests-j2c6/

      - name: Rename package
        run: mv plg_ajax_joomlaajaxforms/tests-j2c6/plg_ajax_joomlaajaxforms_*.zip \
               plg_ajax_joomlaajaxforms/tests-j2c6/extension.zip

      - name: Build J2Commerce 6 from source
        run: |
          git clone --depth=1 https://github.com/j2commerce/j2commerce.git /tmp/j2commerce6-src
          cd /tmp/j2commerce6-src
          php build/build_package.php
          # build_package.php writes to docs/packages/
          ZIP=$(ls docs/packages/pkg_j2commerce_*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            ZIP=$(ls docs/packages/com_j2commerce_*.zip 2>/dev/null | head -1)
          fi
          if [ -z "$ZIP" ]; then
            echo "ERROR: No J2Commerce 6 package ZIP found in docs/packages/" && ls docs/packages/ && exit 1
          fi
          echo "Built: $ZIP"
          cp "$ZIP" "$GITHUB_WORKSPACE/plg_ajax_joomlaajaxforms/tests-j2c6/j2commerce6.zip"

      - name: Build image
        run: |
          cd plg_ajax_joomlaajaxforms
          docker build \
            -f tests-j2c6/Dockerfile \
            -t plg_ajax_j2c6_test \
            ../

      - name: Start environment
        run: |
          cd plg_ajax_joomlaajaxforms/tests-j2c6
          docker compose up -d
          timeout 360 bash -c \
            'until docker inspect plg_ajax_j2c6_test \
               --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; \
             do sleep 5; done'

      - name: Show container logs
        if: always()
        run: docker logs plg_ajax_j2c6_test 2>&1 | tail -80 || true

      - name: Run J2C6 cart tests
        run: |
          cd plg_ajax_joomlaajaxforms/tests-j2c6
          chmod +x run-tests.sh
          ./run-tests.sh 11-j2c6-cart

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: j2c6-full-logs
          path: plg_ajax_joomlaajaxforms/tests-j2c6/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          cd plg_ajax_joomlaajaxforms/tests-j2c6
          docker compose down -v

  collect-results:
    name: Collect Results
    runs-on: ubuntu-latest
    needs: [test-j5, test-j6, test-j2c4-full, test-j2c6-full]
    if: always()
    permissions: {}

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts/

      - name: Collect and display logs
        run: |
          echo "=== Test Results Summary ==="
          for dir in test-artifacts/*/; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- $(basename "$dir") ---"
              find "$dir" -name "*.txt" -exec cat {} \;
            fi
          done

      - name: Upload combined logs
        uses: actions/upload-artifact@v4
        with:
          name: all-test-logs
          path: test-artifacts/
          retention-days: 30
