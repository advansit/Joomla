name: Build & Test - J2Store Cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['j2commerce/com_j2store_cleanup/**']

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          cd j2commerce/com_j2store_cleanup
          chmod +x build.sh
          ./build.sh
          cp *.zip tests/extension.zip
      - uses: actions/upload-artifact@v7
        with:
          name: extension-package
          path: j2commerce/com_j2store_cleanup/tests/extension.zip
          retention-days: 1

  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Check PHP syntax
        run: |
          find j2commerce/com_j2store_cleanup -name "*.php" -exec php -l {} \;

  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Scanning'
            script: 'scanning'
          - name: '03 - Cleanup'
            script: 'cleanup'
          - name: '04 - Component Functions'
            script: 'functions'
          - name: '05 - Safety Checks'
            script: 'safety'
          - name: '06 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: extension-package
          path: j2commerce/com_j2store_cleanup/tests/
      - name: Start environment
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          docker compose up -d
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec com_j2store_cleanup_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          echo "=== Joomla Container Logs ==="
          docker compose logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          chmod +x run-tests.sh
          ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ matrix.script }}-logs
          path: j2commerce/com_j2store_cleanup/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          docker compose down -v

  collect-results:
    name: Collect Results
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions: {}

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          path: test-artifacts/

      - name: Collect and display logs
        run: |
          echo "=== Test Results Summary ==="
          for dir in test-artifacts/*/; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- $(basename "$dir") ---"
              find "$dir" -name "*.txt" -exec cat {} \;
            fi
          done

      - name: Upload combined logs
        uses: actions/upload-artifact@v7
        with:
          name: all-test-logs
          path: test-artifacts/
          retention-days: 30
