name: Build & Test - J2Store Cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['j2commerce/com_j2store_cleanup/**']
  pull_request:
    branches: [main]
    paths: ['j2commerce/com_j2store_cleanup/**']

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build
        run: |
          cd j2commerce/com_j2store_cleanup
          chmod +x build.sh
          ./build.sh
          cp *.zip tests/extension.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: extension-package
          path: j2commerce/com_j2store_cleanup/tests/extension.zip
          retention-days: 1

  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
      - name: Check PHP syntax
        run: |
          find j2commerce/com_j2store_cleanup -name "*.php" -exec php -l {} \;

  test-j5:
    name: ${{ matrix.name }} (J5)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Scanning'
            script: 'scanning'
          - name: '03 - Cleanup'
            script: 'cleanup'
          - name: '04 - Component Functions'
            script: 'functions'
          - name: '05 - Safety Checks'
            script: 'safety'
          - name: '06 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: extension-package
          path: j2commerce/com_j2store_cleanup/tests/
      - name: Start environment (J5)
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          for attempt in 1 2 3; do
            if docker compose up -d; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            docker compose down -v || true
            sleep 20
          done
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec com_j2store_cleanup_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          echo "=== Joomla Container Logs ==="
          docker compose logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          chmod +x run-tests.sh
          ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: j5-${{ matrix.script }}-logs
          path: j2commerce/com_j2store_cleanup/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          docker compose down -v

  build-j2c6:
    name: Build J2Commerce 6
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup PHP for J2Commerce build
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: zip
      - name: Build J2Commerce 6 from source
        run: |
          # j2commerce/j2commerce publishes no release tags, so pin the source to a
          # specific main commit for deterministic, reproducible builds.
          J2C6_COMMIT=2dd491e8e1b129a8754065937f85769d97ca76fa # pinned (main)
          git init /tmp/j2commerce6-src
          git -C /tmp/j2commerce6-src remote add origin https://github.com/j2commerce/j2commerce.git
          git -C /tmp/j2commerce6-src fetch --depth 1 origin "$J2C6_COMMIT"
          git -C /tmp/j2commerce6-src checkout --detach FETCH_HEAD
          echo "J2Commerce 6 source commit: $(git -C /tmp/j2commerce6-src rev-parse HEAD)"
          cd /tmp/j2commerce6-src && php build/build_package.php
          # Robust, deterministic ZIP selection: nullglob so a non-matching glob
          # expands to nothing (instead of aborting the step under pipefail), and a
          # fixed glob order (pkg_ preferred over com_) for reproducibility.
          shopt -s nullglob
          zips=( docs/packages/pkg_j2commerce_*.zip docs/packages/com_j2commerce_*.zip )
          if (( ${#zips[@]} == 0 )); then
            echo "ERROR: No J2Commerce 6 ZIP found in docs/packages"
            ls -la docs/packages/ || true
            exit 1
          fi
          ZIP="${zips[0]}"
          sha256sum "$ZIP"
          mkdir -p "$GITHUB_WORKSPACE/j2c6-dist"
          cp "$ZIP" "$GITHUB_WORKSPACE/j2c6-dist/j2commerce6.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: j2commerce6-package
          path: j2c6-dist/j2commerce6.zip
          retention-days: 1

  test-j6:
    name: ${{ matrix.name }} (J6 + J2C6)
    runs-on: ubuntu-latest
    needs: [build, build-j2c6]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Scanning'
            script: 'scanning'
          - name: '03 - Cleanup'
            script: 'cleanup'
          - name: '04 - Component Functions'
            script: 'functions'
          - name: '05 - Safety Checks'
            script: 'safety'
          - name: '06 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: extension-package
          path: j2commerce/com_j2store_cleanup/tests/
      - name: Download J2Commerce 6 package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: j2commerce6-package
          path: j2commerce/com_j2store_cleanup/tests/
      - name: Start environment (J6 + J2Commerce 6)
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.joomla6.yml up -d; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            docker compose -f docker-compose.joomla6.yml down -v || true
            sleep 20
          done
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec com_j2store_cleanup_j6_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          echo "=== Joomla Container Logs ==="
          docker compose -f docker-compose.joomla6.yml logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          chmod +x run-tests.sh
          CONTAINER_NAME=com_j2store_cleanup_j6_test ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: j6-${{ matrix.script }}-logs
          path: j2commerce/com_j2store_cleanup/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          docker compose -f docker-compose.joomla6.yml down -v

  official-j5-j2c4:
    name: Cleanup / official-j5-j2c4
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: extension-package
          path: j2commerce/com_j2store_cleanup/tests/
      - name: Start official J5/J2C4 environment
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          for attempt in 1 2 3; do
            if EXPECTED_CORE_COMPONENT=com_j2store docker compose up -d; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            EXPECTED_CORE_COMPONENT=com_j2store docker compose down -v || true
            sleep 20
          done
          timeout 300 bash -c 'until docker exec com_j2store_cleanup_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
      - name: Run core protection safety checks
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          chmod +x run-tests.sh
          ./run-tests.sh safety
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: official-j5-j2c4-safety-logs
          path: j2commerce/com_j2store_cleanup/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2store_cleanup/tests
          EXPECTED_CORE_COMPONENT=com_j2store docker compose down -v

  official-j6-j2c6:
    name: Cleanup / official-j6-j2c6
    runs-on: ubuntu-latest
    needs: test-j6
    if: always()
    permissions: {}
    steps:
      - name: Verify official J6/J2C6 full suite
        run: |
          # The test-j6 matrix now runs the FULL 6-script suite against a real
          # Joomla 6 + J2Commerce 6 stack (J2Commerce 6 built from source). This
          # gate fails if any script in that matrix failed.
          if [ "${{ needs.test-j6.result }}" != "success" ]; then
            echo "Official J6/J2C6 full suite did not pass: ${{ needs.test-j6.result }}"
            exit 1
          fi
          echo "Official J6/J2C6 full suite passed"

  collect-results:
    name: Collect Results
    runs-on: ubuntu-latest
    needs: [test-j5, test-j6, official-j5-j2c4, official-j6-j2c6]
    if: always()
    permissions: {}

    steps:
      - name: Download all test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: test-artifacts/

      - name: Collect and display logs
        run: |
          echo "=== Test Results Summary ==="
          for dir in test-artifacts/*/; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- $(basename "$dir") ---"
              find "$dir" -name "*.txt" -exec cat {} \;
            fi
          done

      - name: Upload combined logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: all-test-logs
          path: test-artifacts/
          retention-days: 30
