name: Build & Test - J2Commerce Import/Export

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: 
      - 'j2commerce/com_j2commerce_importexport/**'
  pull_request:
    branches: [main]
    paths:
      - 'j2commerce/com_j2commerce_importexport/**'
      - 'shared/**'

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cd j2commerce/com_j2commerce_importexport
          chmod +x build.sh
          ./build.sh
          mkdir -p tests
          cp *.zip tests/extension.zip
      - uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: j2commerce/com_j2commerce_importexport/tests/extension.zip
          retention-days: 1

  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Check PHP syntax
        run: |
          find j2commerce/com_j2commerce_importexport -name "*.php" -exec php -l {} \;

  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Component Structure'
            script: 'structure'
          - name: '03 - Export Model'
            script: 'export-model'
          - name: '04 - Import Model'
            script: 'import-model'
          - name: '05 - Export Controller'
            script: 'export-controller'
          - name: '06 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: j2commerce/com_j2commerce_importexport/tests/
      - name: Start environment
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose up -d
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec com_j2commerce_importexport_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          echo "=== Joomla Container Logs ==="
          docker compose logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          chmod +x run-tests.sh
          ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.script }}-logs
          path: j2commerce/com_j2commerce_importexport/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose down -v

  test-j2c4-full:
    name: ${{ matrix.name }} (J5+J2C4)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Component Structure'
            script: 'structure'
          - name: '03 - Export Model'
            script: 'export-model'
          - name: '04 - Import Model'
            script: 'import-model'
          - name: '05 - Export Controller'
            script: 'export-controller'
          - name: '06 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: j2commerce/com_j2commerce_importexport/tests/
      - name: Build J2C4 image
        run: |
          cp j2commerce/shared/docker-entrypoint-j2c-base.sh \
             j2commerce/com_j2commerce_importexport/tests/docker-entrypoint-j2c-base.sh
          cd j2commerce/com_j2commerce_importexport/tests
          docker build -f Dockerfile.j2c4 -t com_j2commerce_importexport_test_j2c4 .
      - name: Start environment
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose -f docker-compose.j2c4.yml up -d
          timeout 360 bash -c 'until docker exec com_j2commerce_importexport_test_j2c4 test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
      - name: Show container logs
        if: always()
        run: docker logs com_j2commerce_importexport_test_j2c4 2>&1 | tail -80 || true
      - name: Run tests
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          CONTAINER_NAME=com_j2commerce_importexport_test_j2c4 ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: j2c4-${{ matrix.script }}-logs
          path: j2commerce/com_j2commerce_importexport/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose -f docker-compose.j2c4.yml down -v

  test-j2c6-full:
    name: ${{ matrix.name }} (J6+J2C6)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Component Structure'
            script: 'structure'
          - name: '03 - Export Model'
            script: 'export-model'
          - name: '04 - Import Model'
            script: 'import-model'
          - name: '05 - Export Controller'
            script: 'export-controller'
          - name: '06 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: j2commerce/com_j2commerce_importexport/tests/
      - name: Build J2Commerce 6 from source
        run: |
          git clone --depth=1 https://github.com/j2commerce/j2commerce.git /tmp/j2commerce6-src
          cd /tmp/j2commerce6-src && php build/build_package.php
          ZIP=$(ls docs/packages/pkg_j2commerce_*.zip docs/packages/com_j2commerce_*.zip 2>/dev/null | head -1)
          [ -z "$ZIP" ] && echo "ERROR: No J2Commerce 6 ZIP found" && ls docs/packages/ && exit 1
          cp "$ZIP" "$GITHUB_WORKSPACE/j2commerce/com_j2commerce_importexport/tests/j2commerce6.zip"
      - name: Build J2C6 image
        run: |
          cp j2commerce/shared/docker-entrypoint-j2c-base.sh \
             j2commerce/com_j2commerce_importexport/tests/docker-entrypoint-j2c-base.sh
          cd j2commerce/com_j2commerce_importexport/tests
          docker build -f Dockerfile.j2c6 -t com_j2commerce_importexport_test_j2c6 .
      - name: Start environment
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose -f docker-compose.j2c6.yml up -d
          timeout 360 bash -c 'until docker exec com_j2commerce_importexport_test_j2c6 test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
      - name: Show container logs
        if: always()
        run: docker logs com_j2commerce_importexport_test_j2c6 2>&1 | tail -80 || true
      - name: Run tests
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          CONTAINER_NAME=com_j2commerce_importexport_test_j2c6 ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: j2c6-${{ matrix.script }}-logs
          path: j2commerce/com_j2commerce_importexport/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose -f docker-compose.j2c6.yml down -v

  collect-results:
    name: Collect Results
    runs-on: ubuntu-latest
    needs: [test, test-j2c4-full, test-j2c6-full]
    if: always()
    permissions: {}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: test-artifacts/
      - name: Collect and display logs
        run: |
          echo "=== Test Results Summary ==="
          for dir in test-artifacts/*/; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- $(basename "$dir") ---"
              find "$dir" -name "*.txt" -exec cat {} \;
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: all-test-logs
          path: test-artifacts/
          retention-days: 30
