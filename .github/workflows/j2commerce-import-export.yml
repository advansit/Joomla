name: Build & Test - J2Commerce Import/Export

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: 
      - 'j2commerce/com_j2commerce_importexport/**'
  pull_request:
    branches: [main]
    paths:
      - 'j2commerce/com_j2commerce_importexport/**'
      - 'shared/**'

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build
        run: |
          cd j2commerce/com_j2commerce_importexport
          chmod +x build.sh
          ./build.sh
          mkdir -p tests
          cp *.zip tests/extension.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: extension-package
          path: j2commerce/com_j2commerce_importexport/tests/extension.zip
          retention-days: 1

  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
      - name: Check PHP syntax
        run: |
          find j2commerce/com_j2commerce_importexport -name "*.php" -exec php -l {} \;

  test-j5:
    name: ${{ matrix.name }} (J5)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Component Structure'
            script: 'structure'
          - name: '03 - Export Model'
            script: 'export-model'
          - name: '04 - Import Model'
            script: 'import-model'
          - name: '04b - Round-Trip'
            script: 'roundtrip'
          - name: '05 - Export Controller'
            script: 'export-controller'
          - name: '07 - Export HTTP (CSRF)'
            script: 'export-http'
          - name: '08 - Import HTTP (CSRF)'
            script: 'import-http'
          - name: '06 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: extension-package
          path: j2commerce/com_j2commerce_importexport/tests/
      - name: Start environment (J5)
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose up -d
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec com_j2commerce_importexport_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          echo "=== Joomla Container Logs ==="
          docker compose logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          chmod +x run-tests.sh
          ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: j5-${{ matrix.script }}-logs
          path: j2commerce/com_j2commerce_importexport/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose down -v

  test-j6:
    name: ${{ matrix.name }} (J6)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Component Structure'
            script: 'structure'
          - name: '03 - Export Model'
            script: 'export-model'
          - name: '04 - Import Model'
            script: 'import-model'
          - name: '04b - Round-Trip'
            script: 'roundtrip'
          - name: '05 - Export Controller'
            script: 'export-controller'
          - name: '07 - Export HTTP (CSRF)'
            script: 'export-http'
          - name: '08 - Import HTTP (CSRF)'
            script: 'import-http'
          - name: '06 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: extension-package
          path: j2commerce/com_j2commerce_importexport/tests/
      - name: Setup PHP for J2Commerce build
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: zip
      - name: Build J2Commerce 6 from source
        run: |
          git clone --depth=1 https://github.com/j2commerce/j2commerce.git /tmp/j2commerce6-src
          echo "J2Commerce 6 source commit: $(git -C /tmp/j2commerce6-src rev-parse HEAD)"
          cd /tmp/j2commerce6-src && php build/build_package.php
          ZIP=$(ls docs/packages/pkg_j2commerce_*.zip docs/packages/com_j2commerce_*.zip 2>/dev/null | head -1)
          [ -z "$ZIP" ] && echo "ERROR: No J2Commerce 6 ZIP found" && ls docs/packages/ && exit 1
          sha256sum "$ZIP"
          cp "$ZIP" "$GITHUB_WORKSPACE/j2commerce/com_j2commerce_importexport/tests/j2commerce6.zip"
      - name: Start environment (J6)
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.joomla6.yml up -d; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            docker compose -f docker-compose.joomla6.yml down -v || true
            sleep 20
          done
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec com_j2commerce_importexport_j6_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          echo "=== Joomla Container Logs ==="
          docker compose -f docker-compose.joomla6.yml logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          chmod +x run-tests.sh
          CONTAINER_NAME=com_j2commerce_importexport_j6_test J2COMMERCE_STACK=j6 ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: j6-${{ matrix.script }}-logs
          path: j2commerce/com_j2commerce_importexport/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/com_j2commerce_importexport/tests
          docker compose -f docker-compose.joomla6.yml down -v

  official-j5-j2c4:
    name: Import/Export / official-j5-j2c4
    runs-on: ubuntu-latest
    needs: test-j5
    if: always()
    permissions: {}
    steps:
      - name: Verify official J5/J2C4 matrix
        run: |
          if [ "${{ needs.test-j5.result }}" != "success" ]; then
            echo "Official J5/J2C4 matrix did not pass: ${{ needs.test-j5.result }}"
            exit 1
          fi

  official-j6-j2c6:
    name: Import/Export / official-j6-j2c6
    runs-on: ubuntu-latest
    needs: test-j6
    if: always()
    permissions: {}
    steps:
      - name: Verify official J6/J2C6 matrix
        run: |
          if [ "${{ needs.test-j6.result }}" != "success" ]; then
            echo "Official J6/J2C6 matrix did not pass: ${{ needs.test-j6.result }}"
            exit 1
          fi

  collect-results:
    name: Collect Results
    runs-on: ubuntu-latest
    needs: [test-j5, test-j6]
    if: always()
    permissions: {}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: test-artifacts/
      - name: Collect and display logs
        run: |
          echo "=== Test Results Summary ==="
          for dir in test-artifacts/*/; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- $(basename "$dir") ---"
              find "$dir" -name "*.txt" -exec cat {} \;
            fi
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: all-test-logs
          path: test-artifacts/
          retention-days: 30
