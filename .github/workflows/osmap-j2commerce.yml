name: Build & Test - OSMap J2Commerce

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['j2commerce/plg_osmap_j2commerce/**']

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          cd j2commerce/plg_osmap_j2commerce
          chmod +x build.sh
          ./build.sh
          cp *.zip tests/extension.zip
      - uses: actions/upload-artifact@v7
        with:
          name: extension-package
          path: j2commerce/plg_osmap_j2commerce/tests/extension.zip
          retention-days: 1

  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Configuration'
            script: 'configuration'
          - name: '03 - Plugin Class'
            script: 'plugin-class'
          - name: '04 - Sitemap Output'
            script: 'sitemap'
          - name: '05 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: extension-package
          path: j2commerce/plg_osmap_j2commerce/tests/
      - name: Start environment
        run: |
          cd j2commerce/plg_osmap_j2commerce/tests
          docker compose up -d
      - name: Run tests
        timeout-minutes: 12
        run: |
          cd j2commerce/plg_osmap_j2commerce/tests
          chmod +x run-tests.sh
          ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ matrix.script }}-logs
          path: j2commerce/plg_osmap_j2commerce/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/plg_osmap_j2commerce/tests
          docker compose down -v


