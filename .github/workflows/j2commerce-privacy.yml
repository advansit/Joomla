name: Build & Test - J2Commerce Privacy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: 
      - 'j2commerce/plg_privacy_j2commerce/**'
      - 'shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'j2commerce/plg_privacy_j2commerce/**'
      - 'shared/**'

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          cd j2commerce/plg_privacy_j2commerce
          chmod +x build.sh
          ./build.sh
          mkdir -p tests
          cp *.zip tests/extension.zip
      - uses: actions/upload-artifact@v7
        with:
          name: extension-package
          path: j2commerce/plg_privacy_j2commerce/tests/extension.zip
          retention-days: 1

  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Check PHP syntax
        run: |
          find j2commerce/plg_privacy_j2commerce/src -name "*.php" -exec php -l {} \;
          find j2commerce/plg_privacy_j2commerce/overrides -name "*.php" -exec php -l {} \;
          php -l j2commerce/plg_privacy_j2commerce/script.php

  test-j5:
    name: ${{ matrix.name }} (J5)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Configuration'
            script: 'configuration'
          - name: '03 - Privacy Plugin Base'
            script: 'privacy'
          - name: '04 - Data Integration'
            script: 'data_integration'
          - name: '05 - Data Export'
            script: 'export'
          - name: '06 - Data Anonymization'
            script: 'anonymization'
          - name: '07 - GDPR Compliance'
            script: 'gdpr'
          - name: '08 - Template Overrides'
            script: 'template_overrides'
          - name: '09 - AutoCleanup Task'
            script: 'autocleanup_task'
          - name: '10 - AcyMailing Integration'
            script: 'acymailing'
          - name: '11 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: extension-package
          path: j2commerce/plg_privacy_j2commerce/tests/
      - name: Start environment (J5)
        run: |
          cd j2commerce/plg_privacy_j2commerce/tests
          docker compose up -d
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec plg_privacy_j2commerce_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd j2commerce/plg_privacy_j2commerce/tests
          docker compose logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd j2commerce/plg_privacy_j2commerce/tests
          chmod +x run-tests.sh
          ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: j5-${{ matrix.script }}-logs
          path: j2commerce/plg_privacy_j2commerce/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/plg_privacy_j2commerce/tests
          docker compose down -v

  test-j6:
    name: ${{ matrix.name }} (J6)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: '01 - Installation'
            script: 'installation'
          - name: '02 - Configuration'
            script: 'configuration'
          - name: '03 - Privacy Plugin Base'
            script: 'privacy'
          - name: '04 - Data Integration'
            script: 'data_integration'
          - name: '05 - Data Export'
            script: 'export'
          - name: '06 - Data Anonymization'
            script: 'anonymization'
          - name: '07 - GDPR Compliance'
            script: 'gdpr'
          - name: '08 - Template Overrides'
            script: 'template_overrides'
          - name: '09 - AutoCleanup Task'
            script: 'autocleanup_task'
          - name: '10 - AcyMailing Integration'
            script: 'acymailing'
          - name: '11 - Uninstall'
            script: 'uninstall'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: extension-package
          path: j2commerce/plg_privacy_j2commerce/tests/
      - name: Start environment (J6)
        run: |
          cd j2commerce/plg_privacy_j2commerce/tests
          docker compose -f docker-compose.joomla6.yml up -d
          echo "Waiting for container to be ready..."
          timeout 300 bash -c 'until docker exec plg_privacy_j2commerce_j6_test test -f /var/www/html/health.txt 2>/dev/null; do sleep 5; done'
          echo "Container ready"
      - name: Show container logs
        if: always()
        run: |
          cd j2commerce/plg_privacy_j2commerce/tests
          docker compose -f docker-compose.joomla6.yml logs joomla 2>&1 | tail -100 || true
      - name: Run tests
        run: |
          cd j2commerce/plg_privacy_j2commerce/tests
          chmod +x run-tests.sh
          J2COMMERCE_STACK=j6 COMPOSE_FILE=docker-compose.joomla6.yml CONTAINER_NAME=plg_privacy_j2commerce_j6_test ./run-tests.sh ${{ matrix.script }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: j6-${{ matrix.script }}-logs
          path: j2commerce/plg_privacy_j2commerce/tests/test-results/*.txt
      - name: Cleanup
        if: always()
        run: |
          cd j2commerce/plg_privacy_j2commerce/tests
          docker compose -f docker-compose.joomla6.yml down -v

  collect-results:
    name: Collect Results
    runs-on: ubuntu-latest
    needs: [test-j5, test-j6]
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: test-artifacts/
      - name: Collect and display logs
        run: |
          echo "=== Test Results Summary ==="
          for dir in test-artifacts/*/; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- $(basename "$dir") ---"
              find "$dir" -name "*.txt" -exec cat {} \;
            fi
          done
      - name: Upload combined logs
        uses: actions/upload-artifact@v7
        with:
          name: all-test-logs
          path: test-artifacts/
          retention-days: 30
