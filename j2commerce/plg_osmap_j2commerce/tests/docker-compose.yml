services:
  joomla:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plg_osmap_j2commerce_test
    ports:
      - "8080:80"
    environment:
      JOOMLA_DB_HOST: mysql
      JOOMLA_DB_USER: joomla
      JOOMLA_DB_PASSWORD: joomla_pass
      JOOMLA_DB_NAME: joomla_db
      JOOMLA_SITE_NAME: "Test Site"
      JOOMLA_ADMIN_USER: "Super User"
      JOOMLA_ADMIN_USERNAME: admin
      JOOMLA_ADMIN_PASSWORD: Admin123456789!
      JOOMLA_ADMIN_EMAIL: admin@test.local
      # Install OSMap, J2Commerce, and the plugin via Joomla's built-in extension installer
      JOOMLA_EXTENSIONS_PATHS: "/tmp/osmap.zip;/tmp/j2commerce.zip;/tmp/extension.zip"
    volumes:
      - joomla_data:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: plg_osmap_j2commerce_test_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: joomla_db
      MYSQL_USER: joomla
      MYSQL_PASSWORD: joomla_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  joomla_data:
  mysql_data:
