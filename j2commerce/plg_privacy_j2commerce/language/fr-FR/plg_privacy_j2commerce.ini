PLG_PRIVACY_J2COMMERCE_POSTINSTALL_SQL_CREATE_DESC="Exécuter ce SQL dans phpMyAdmin ou la console de base de données (remplacer <strong>#__</strong> par le préfixe de table Joomla, par ex. <strong>jos_</strong>) :"
PLG_PRIVACY_J2COMMERCE_POSTINSTALL_SQL_CREATE_NOTE="Cette table n'est <strong>pas</strong> visible dans l'interface Custom Fields de J2Commerce (Composants → J2Commerce → Custom Fields). C'est une table de base de données séparée utilisée uniquement par ce plugin de confidentialité."
PLG_PRIVACY_J2COMMERCE_POSTINSTALL_SQL_ASSIGN_TITLE="2. Marquer les produits comme licences à vie"
PLG_PRIVACY_J2COMMERCE_POSTINSTALL_SQL_ASSIGN_DESC="Pour chaque produit avec une licence à vie, insérer une ligne (remplacer <strong>123</strong> par l'ID produit J2Store réel) :"
PLG_PRIVACY_J2COMMERCE_POSTINSTALL_SQL_ASSIGN_HINT="L'ID produit J2Store se trouve sous <strong>Components → J2Store → Catalog → Products</strong> dans la colonne ID."
PLG_PRIVACY_J2COMMERCE_POSTINSTALL_SQL_QUERY_TITLE="3. Comment le plugin utilise cette table"
