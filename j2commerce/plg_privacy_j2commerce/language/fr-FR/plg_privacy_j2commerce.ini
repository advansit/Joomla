PLG_PRIVACY_J2COMMERCE_POSTINSTALL_STEP3_DESC="Uniquement pertinent pour les boutiques vendant des produits avec des licences perpétuelles. Le plugin vérifie la présence d'une licence à vie lors de la suppression des données client et préserve l'adresse e-mail pour la réactivation de la licence. Sans cette table, toutes les données client sont supprimées après l'expiration de la période de conservation."
