; Payment Provider Disclaimer
PLG_PRIVACY_J2COMMERCE_PAYMENT_PROVIDER_TITLE="Données de paiement"
PLG_PRIVACY_J2COMMERCE_PAYMENT_PROVIDER_NOTICE="Les données de paiement (détails de carte de crédit, informations bancaires) sont stockées et traitées par nos prestataires de services de paiement (par ex. Stripe, PayPal), pas par nous. Nous n'avons pas accès à vos données de paiement complètes. Pour toute question concernant vos données de paiement, veuillez contacter directement le prestataire de paiement concerné."

; Legal Retention Notice
PLG_PRIVACY_J2COMMERCE_RETENTION_NOTICE_TITLE="Avis de conservation des données"
PLG_PRIVACY_J2COMMERCE_RETENTION_NOTICE="Conformément au droit suisse (OR Art. 958f, MWSTG Art. 70), les données de commande y compris les adresses doivent être conservées pendant 10 ans à des fins comptables. Les commandes dans cette période de conservation ne peuvent pas être supprimées ou anonymisées. Après l'expiration de la période de conservation, les données seront automatiquement anonymisées."

